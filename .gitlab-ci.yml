stages:
  - build_linux
  - build_windows
  - build_mac

build-job-linux:
  stage: build_linux
  variables:
    GIT_STRATEGY: none

  script:
    - echo $CI_PROJECT_DIR
    - cd $CI_PROJECT_DIR
    - rm -rf misfitz-viewer
    - echo $CI_REPOSITORY_URL
    - echo $CI_COMMIT_SHA
    - git clone $CI_REPOSITORY_URL
    - ls --full
    - cd $CI_PROJECT_DIR/misfitz-viewer
    - echo $CI_PROJECT_DIR/misfitz-viewer
    - ls --full
    - pwd
    - git reset --hard $CI_COMMIT_SHA
    - git submodule update --init --recursive
    - cd ..
    - cp /home/build/viewer/build.sh .
    - cp /home/build/viewer/upload-symbols.sh .
    - pwd
    - chmod +x build.sh
    - chmod +x upload-symbols.sh
    - ./build.sh
    - ./upload-symbols.sh
  tags:
    - build
    - linux
  artifacts:
    when: on_success
    paths:
      - misfitz-viewer/build-linux-x86_64/newview/Phoenix-*.xz
      - misfitz-viewer/build-linux-x86_64/newview/Phoenix-*.bz2
  resource_group: global_pipeline_lock

build-job-windows:
  stage: build_windows
  variables:
    AUTOBUILD_VARIABLES_FILE: "/root/src/fs-build-variables/variables"
    GIT_STRATEGY: none
  script:
    - C:\src\launch.bat $CI_PROJECT_DIR $CI_COMMIT_SHA
  tags:
    - build
    - windows
  artifacts:
    when: on_success
    paths:
      - misfitz-viewer\build-vc170-64\newview\Release\Phoenix*.exe

build-job-mac:
  stage: build_mac
  script:
    - echo $CI_PROJECT_DIR
    - cd $CI_PROJECT_DIR
    - rm -rf misfitz-viewer
    - echo $CI_REPOSITORY_URL
    - echo $CI_COMMIT_SHA
    - git clone $CI_REPOSITORY_URL
    - cd misfitz-viewer
    - git reset --hard $CI_COMMIT_SHA
    - git submodule update --init --recursive
    - cd ..
    - cp /Users/jordan/Projects/build.sh .
    - cp /Users/jordan/Projects/upload-symbols.sh .
    - pwd
    - ./build.sh
    - ./upload-symbols.sh
  tags:
    - build
    - macos
  artifacts:
    when: on_success
    paths:
      - misfitz-viewer/build-darwin-x86_64/newview/Phoenix-*.dmg
  resource_group: global_pipeline_lock
  variables:
    GIT_STRATEGY: none