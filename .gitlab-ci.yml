stages:
  - build_linux
  - build_windows
  - build_mac

build-job-linux:
  stage: build_linux
  variables:
    GIT_STRATEGY: none
    ARTIFACT_STRIP_PATH: "viewer/build-linux-x86_64/newview"

  script:
    - echo $CI_PROJECT_DIR
    - cd $CI_PROJECT_DIR
    - rm -rf viewer
    - echo $CI_REPOSITORY_URL
    - echo $CI_COMMIT_SHA
    - git clone $CI_REPOSITORY_URL viewer
    - ls --full
    - cd $CI_PROJECT_DIR/viewer
    - echo $CI_PROJECT_DIR/viewer
    - ls --full
    - pwd
    - git reset --hard $CI_COMMIT_SHA
    - git submodule update --init --recursive
    - cd ..
    - pwd
    - chmod +x ./viewer/ci/linux/build.sh
    - chmod +x ./viewer/ci/linux/upload-symbols.sh
    - |
      set -o pipefail
      ./viewer/ci/linux/build.sh 2>&1 | tee /tmp/build.log || {
        rc=$?
        echo ""
        echo "========== BUILD FAILED (exit code $rc) =========="
        echo "Last 200 lines of build output:"
        echo "=================================================="
        tail -200 /tmp/build.log
        echo "=================================================="
        echo "Waiting 30s for log flush..."
        sleep 30
        exit $rc
      }
    - ./viewer/ci/linux/upload-symbols.sh
  tags:
    - build
    - linux
  artifacts:
    when: on_success
    paths:
      - viewer/build-linux-x86_64/newview/Phoenix-*.xz
      - viewer/build-linux-x86_64/newview/Phoenix-*.bz2
  resource_group: global_pipeline_lock

build-job-windows:
  stage: build_windows
  variables:
    GIT_STRATEGY: none
    ARTIFACT_STRIP_PATH: "viewer/build-vc170-64/newview/Release"
  script:
    - "@echo Changing to work dir %CI_PROJECT_DIR%"
    - "cd %CI_PROJECT_DIR%"
    - "@echo Cloning %CI_REPOSITORY_URL% to viewer"
    - "git clone %CI_REPOSITORY_URL% viewer"
    - "@echo Resetting to commit %CI_COMMIT_SHA%"
    - "cd viewer"
    - "git reset --hard %CI_COMMIT_SHA%"
    - "cd .."
    - '"C:\Program Files\Git\bin\bash.exe" -c "set -o pipefail; ./viewer/ci/windows/run.sh \"%CI_COMMIT_SHA%\" 2>&1 | tee /tmp/build.log || { rc=$?; echo; echo ========== BUILD FAILED with exit code $rc ==========; echo Last 200 lines of build output:; echo ==================================================; tail -200 /tmp/build.log; echo ==================================================; echo Waiting 30s for log flush...; sleep 30; exit $rc; }"'
  tags:
    - build
    - windows
  artifacts:
    when: on_success
    paths:
      - viewer\build-vc170-64\newview\Release\Phoenix*.exe

build-job-mac:
  stage: build_mac
  script:
    - echo $CI_PROJECT_DIR
    - cd $CI_PROJECT_DIR
    - rm -rf viewer
    - echo $CI_REPOSITORY_URL
    - echo $CI_COMMIT_SHA
    - git clone $CI_REPOSITORY_URL viewer
    - cd viewer
    - git reset --hard $CI_COMMIT_SHA
    - git submodule update --init --recursive
    - cd ..
    - chmod +x ./viewer/ci/mac/build.sh
    - chmod +x ./viewer/ci/mac/upload-symbols.sh
    - |
      set -o pipefail
      ./viewer/ci/mac/build.sh 2>&1 | tee /tmp/build.log || {
        rc=$?
        echo ""
        echo "========== BUILD FAILED (exit code $rc) =========="
        echo "Last 200 lines of build output:"
        echo "=================================================="
        tail -200 /tmp/build.log
        echo "=================================================="
        echo "Waiting 30s for log flush..."
        sleep 30
        exit $rc
      }
    - ./viewer/ci/mac/upload-symbols.sh
  tags:
    - build
    - macos
  artifacts:
    when: on_success
    paths:
      - viewer/build-darwin-x86_64/newview/Phoenix-*.dmg
  resource_group: global_pipeline_lock
  variables:
    GIT_STRATEGY: none
    ARTIFACT_STRIP_PATH: "viewer/build-darwin-x86_64/newview"