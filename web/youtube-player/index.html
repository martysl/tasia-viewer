<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasia Viewer YouTube Player</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #eee;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .shell {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      min-width: 200px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
    }

    .player-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 200px;
      background: #111;
    }

    #player, .player-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .status {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      line-height: 1.35;
    }

    .message {
      color: #cfcfcf;
    }

    .error {
      color: #ffb6b6;
    }

    a.button {
      display: inline-block;
      white-space: nowrap;
      color: #fff;
      background: #333;
      border: 1px solid #666;
      border-radius: 4px;
      padding: 7px 10px;
      text-decoration: none;
    }

    a.button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="player-wrap">
      <div id="player"></div>
    </div>
    <div class="status">
      <div id="message" class="message">Loading YouTube player…</div>
      <a id="open" class="button" href="https://www.youtube.com/" target="_blank" rel="noopener">Open on YouTube</a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var ORIGIN = 'https://apps.easierit.org';
      var params = new URLSearchParams(window.location.search);
      var videoId = (params.get('v') || '').trim();
      var message = document.getElementById('message');
      var open = document.getElementById('open');

      function setMessage(text, isError) {
        message.textContent = text;
        message.className = isError ? 'message error' : 'message';
      }

      function validVideoId(value) {
        return /^[A-Za-z0-9_-]{6,128}$/.test(value);
      }

      if (!validVideoId(videoId)) {
        setMessage('Invalid YouTube video id.', true);
        return;
      }

      open.href = 'https://www.youtube.com/watch?v=' + encodeURIComponent(videoId);

      window.onYouTubeIframeAPIReady = function () {
        new YT.Player('player', {
          videoId: videoId,
          width: '100%',
          height: '100%',
          host: 'https://www.youtube.com',
          playerVars: {
            origin: ORIGIN,
            rel: 0,
            playsinline: 1,
            modestbranding: 1,
            enablejsapi: 1
          },
          events: {
            onReady: function () {
              setMessage('Click play to watch in Tasia Viewer.', false);
            },
            onError: function (event) {
              var code = event && event.data;
              if (code === 101 || code === 150) {
                setMessage('This video owner disabled embedding. Use Open on YouTube.', true);
              } else if (code === 153) {
                setMessage('YouTube rejected the embedded player origin/referrer. Use Open on YouTube.', true);
              } else {
                setMessage('YouTube playback failed' + (code ? ' (error ' + code + ')' : '') + '. Use Open on YouTube.', true);
              }
            }
          }
        });
      };

      var script = document.createElement('script');
      script.src = 'https://www.youtube.com/iframe_api';
      script.onerror = function () {
        setMessage('Could not load YouTube player API. Use Open on YouTube.', true);
      };
      document.head.appendChild(script);
    }());
  </script>
</body>
</html>
