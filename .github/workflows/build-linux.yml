name: Build Tasia Viewer - Linux

on:
  push:
    branches:
      - feature/tasia-giphy-welcome-loading-linux
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub pre-release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTOBUILD_ADDRSIZE: 64
  AUTOBUILD_BUILD_ID: ${{ github.run_id }}
  AUTOBUILD_INSTALLABLE_CACHE: ${{ github.workspace }}/.autobuild-installables
  AUTOBUILD_VARIABLES_FILE: ${{ github.workspace }}/.build-variables/variables
  AUTOBUILD_VCS_INFO: "true"
  LL_SKIP_REQUIRE_SYSROOT: 1
  XZ_DEFAULTS: -T0

jobs:
  build:
    name: Build Tasia Viewer - Linux - FMOD
    timeout-minutes: 240
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout viewer source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore autobuild installables cache
        id: cache-autobuild
        uses: actions/cache@v4
        with:
          path: ${{ env.AUTOBUILD_INSTALLABLE_CACHE }}
          key: autobuild-linux-${{ hashFiles('autobuild.xml') }}

      - name: Install autobuild and Python deps
        run: pip install -r requirements.txt

      - name: Checkout build variables
        uses: actions/checkout@v4
        with:
          repository: FirestormViewer/fs-build-variables
          path: .build-variables

      - name: Remove KDU (proprietary, cannot use)
        shell: bash
        run: |
          autobuild installables remove kdu || true
          echo "KDU installable removed."

      - name: Download private FMOD autobuild package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FMOD_DEPS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::FMOD_DEPS_TOKEN secret is missing."
            echo "::error::Create a read-only token that can download release assets from martysl/tasia-private-deps."
            exit 1
          fi

          mkdir -p private-deps

          FMOD_PLATFORM="linux64"
          FMOD_PATTERN="*linux64*.tar.bz2"

          echo "FMOD_PLATFORM=$FMOD_PLATFORM" >> "$GITHUB_ENV"

          echo "::group::Downloading FMOD package"
          echo "Pattern: $FMOD_PATTERN"
          gh release download fmod-20307 \
            --repo martysl/tasia-private-deps \
            --pattern "$FMOD_PATTERN" \
            --dir private-deps
          echo "::endgroup::"

          FMOD_PACKAGE="$(find private-deps -type f -name '*.tar.bz2' | head -n 1)"

          if [ -z "$FMOD_PACKAGE" ]; then
            echo "::error::FMOD autobuild package was not downloaded."
            echo "::error::Expected pattern: $FMOD_PATTERN"
            echo "::error::Check repo: martysl/tasia-private-deps"
            echo "::error::Check release tag: fmod-20307"
            exit 1
          fi

          echo "Using FMOD package: $FMOD_PACKAGE"
          echo "FMOD_PACKAGE=$FMOD_PACKAGE" >> "$GITHUB_ENV"

          # Calculate MD5 hash of downloaded FMOD package
          FMOD_HASH=$(python3 -c "import hashlib,sys; print(hashlib.md5(open(sys.argv[1],'rb').read()).hexdigest())" "$FMOD_PACKAGE")
          echo "FMOD_HASH=$FMOD_HASH" >> "$GITHUB_ENV"

          # Build file:// URI for the downloaded package
          FMOD_FILE_URL=$(python3 -c "import pathlib,sys; print(pathlib.Path(sys.argv[1]).resolve().as_uri())" "$FMOD_PACKAGE")
          echo "FMOD_FILE_URL=$FMOD_FILE_URL" >> "$GITHUB_ENV"

          echo "FMOD package ready: $FMOD_FILE_URL (MD5: $FMOD_HASH)"

      - name: Point autobuild to private FMOD package
        shell: bash
        run: |
          set -euo pipefail
          autobuild installables edit fmodstudio \
            platform="$FMOD_PLATFORM" \
            hash="$FMOD_HASH" \
            url="$FMOD_FILE_URL"

      - name: Load autobuild environment
        shell: bash
        run: |
          autobuild source_environment > .source_env
          . .source_env
          echo "LL_BUILD=$LL_BUILD" >> "$GITHUB_ENV"
          echo "LL_BUILD_RELEASE=$LL_BUILD_RELEASE" >> "$GITHUB_ENV"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            mesa-common-dev libgl1-mesa-dev libxinerama-dev \
            libxrandr-dev libpulse-dev libglu1-mesa-dev \
            libfreetype6-dev libfontconfig1 ninja-build \
            libdbus-1-dev
          sudo apt-get clean

      - name: Set Tasia build metadata
        shell: bash
        run: |
          echo "revision=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "VIEWER_VERSION_GITHASH=${{ github.sha }}" >> "$GITHUB_ENV"
          TASIA_SHORT_SHA="${{ github.sha }}"
          echo "TASIA_SHORT_SHA=${TASIA_SHORT_SHA::7}" >> "$GITHUB_ENV"
          echo "TASIA_DISPLAY_VERSION=8.0.1.${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "TASIA_BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Configure with FMOD
        shell: bash
        env:
          TASIA_GIPHY_API_KEY: ${{ secrets.TASIA_GIPHY_API_KEY }}
        run: |
          autobuild configure \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            -- \
            --fmodstudio \
            --package \
            --ninja

      - name: Build with FMOD
        shell: bash
        run: |
          autobuild build \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            --no-configure \
            -- \
            --fmodstudio \
            --package \
            --ninja

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tasia-Viewer-Linux-FMOD
          if-no-files-found: error
          path: |
            build-linux-x86_64/newview/*.tar.xz
            build-linux-x86_64/newview/*.bz2

      - name: Publish GitHub pre-release
        if: inputs.publish_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="v8.0.1-${GITHUB_RUN_NUMBER}"
          TITLE="Tasia Viewer 8.0.1.${GITHUB_RUN_NUMBER} Linux Beta"

          PACKAGE="$(find build-linux-x86_64/newview -type f \( -name '*.tar.xz' -o -name '*.bz2' \) | head -n 1)"

          if [ -z "$PACKAGE" ]; then
            echo "ERROR: No Linux viewer package found."
            exit 1
          fi

          NOTES="$(mktemp)"
          printf '%s\n' \
            "Tasia Viewer Linux beta build." \
            "" \
            "Version: 8.0.1.${GITHUB_RUN_NUMBER}" \
            "Commit: ${GITHUB_SHA::7}" \
            "Channel: Tasia-Releasex64" \
            "FMOD: enabled" \
            "KDU: removed" \
            "" \
            "This is a beta/pre-release build." \
            "Mom must test before stable release." \
            > "$NOTES"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$PACKAGE" --clobber
          else
            gh release create "$TAG" "$PACKAGE" \
              --title "$TITLE" \
              --notes-file "$NOTES" \
              --prerelease
          fi

      - name: Post to Discord
        if: inputs.publish_release == 'true'
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          python3 - "${{ github.repository }}" "${{ github.sha }}" "${{ github.run_number }}" <<'PYEOF'
import json, os, sys, urllib.request

repo = sys.argv[1]
sha = sys.argv[2][:7]
run = sys.argv[3]
version = f"8.0.1.{run}"
tag = f"v8.0.1-{run}"
release_url = f"https://github.com/{repo}/releases/tag/{tag}"

payload = {
    "embeds": [{
        "title": f"Tasia Viewer {version} — Linux Beta",
        "description": "Linux build ready!",
        "url": release_url,
        "color": 3066993,
        "fields": [
            {"name": "Version", "value": version, "inline": True},
            {"name": "Platform", "value": "Linux (x86_64)", "inline": True},
            {"name": "Commit", "value": sha, "inline": True},
        ],
        "footer": {"text": "💚 Tasia Release"}
    }]
}

req = urllib.request.Request(
    os.environ["DISCORD_WEBHOOK_URL"],
    data=json.dumps(payload).encode(),
    headers={"Content-Type": "application/json"},
    method="POST"
)
urllib.request.urlopen(req)
PYEOF
