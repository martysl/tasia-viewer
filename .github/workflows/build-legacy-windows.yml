name: Build Legacy Viewer - Windows

on:
  push:
    branches:
      - tasia-legacy-port
      - tasia-legacy-port-win
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub pre-release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTOBUILD_ADDRSIZE: 64
  AUTOBUILD_BUILD_ID: ${{ github.run_id }}
  AUTOBUILD_INSTALLABLE_CACHE: ${{ github.workspace }}/.autobuild-installables
  AUTOBUILD_VARIABLES_FILE: ${{ github.workspace }}/.build-variables/variables
  AUTOBUILD_VCS_INFO: "true"
  AUTOBUILD_VSVER: 170
  LL_SKIP_REQUIRE_SYSROOT: 1
  XZ_DEFAULTS: -T0

jobs:
  build:
    name: Build Legacy Viewer - Windows - FMOD
    runs-on: windows-2022
    timeout-minutes: 240

    steps:
      - name: Checkout viewer source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore autobuild installables cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUTOBUILD_INSTALLABLE_CACHE }}
          key: autobuild-legacy-windows-${{ hashFiles('autobuild.xml') }}

      - name: Install autobuild and Python deps
        run: pip install -r requirements.txt

      - name: Checkout build variables
        uses: actions/checkout@v4
        with:
          repository: FirestormViewer/fs-build-variables
          path: .build-variables

      - name: Remove KDU (proprietary, cannot use)
        shell: bash
        run: |
          autobuild installables remove kdu || true

      - name: Download private FMOD autobuild package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FMOD_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN:-}" ] || { echo "::error::FMOD_DEPS_TOKEN missing"; exit 1; }

          mkdir -p private-deps
          gh release download fmod-20307 \
            --repo martysl/tasia-private-deps \
            --pattern "*windows64*.tar.bz2" \
            --dir private-deps

          FMOD_PACKAGE="$(find private-deps -type f -name '*.tar.bz2' | head -n 1)"
          [ -n "$FMOD_PACKAGE" ] || { echo "::error::FMOD package missing"; exit 1; }

          FMOD_HASH=$(python3 -c "import hashlib,sys; print(hashlib.md5(open(sys.argv[1],'rb').read()).hexdigest())" "$FMOD_PACKAGE")
          FMOD_FILE_URL=$(python3 -c "import pathlib,sys; print(pathlib.Path(sys.argv[1]).resolve().as_uri())" "$FMOD_PACKAGE")

          echo "FMOD_PLATFORM=windows64" >> "$GITHUB_ENV"
          echo "FMOD_HASH=$FMOD_HASH" >> "$GITHUB_ENV"
          echo "FMOD_FILE_URL=$FMOD_FILE_URL" >> "$GITHUB_ENV"

      - name: Point autobuild to private FMOD package
        shell: bash
        run: |
          autobuild installables edit fmodstudio \
            platform="$FMOD_PLATFORM" \
            hash="$FMOD_HASH" \
            url="$FMOD_FILE_URL"

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Configure Windows with FMOD
        shell: bash
        env:
          TASIA_GIPHY_API_KEY: ${{ secrets.TASIA_GIPHY_API_KEY }}
        run: |
          set -euo pipefail
          unset CC || true
          unset CXX || true
          LOCAL_DIST_DIR="$(pwd)/build-vc170-64/newview/unpacked"
          mkdir -p "$LOCAL_DIST_DIR"
          autobuild configure \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            -- \
            --fmodstudio \
            --package \
            --ninja \
            "-DLOCAL_DIST_DIR:PATH=$LOCAL_DIST_DIR" \
            "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF"

      - name: Stage runtime DLLs for packaging
        shell: bash
        run: |
          set -euo pipefail
          SHAREDLIBS="build-vc170-64/sharedlibs/Release"
          PKGLIBS="build-vc170-64/packages/lib/release"
          mkdir -p "$SHAREDLIBS"

          # Copy DLLs from autobuild packages (where Ninja puts them)
          if [ -d "$PKGLIBS" ]; then
            find "$PKGLIBS" -maxdepth 1 -name '*.dll' -exec cp -v {} "$SHAREDLIBS/" \;
            echo "Staged $(ls "$SHAREDLIBS"/*.dll 2>/dev/null | wc -l) DLLs from packages/lib/release"
          else
            echo "WARNING: $PKGLIBS not found"
          fi

          # Copy MSVC runtime DLLs (msvcp140.dll, vcruntime140.dll).
          # The ilammy/msvc-dev-cmd action sets VCToolsRedistDir.
          REDIST_DIR="${VCToolsRedistDir:-}"
          if [ -n "$REDIST_DIR" ]; then
            CRT_DIR="${REDIST_DIR}x64/Microsoft.VC143.CRT"
            echo "Using VCToolsRedistDir: $REDIST_DIR"
          else
            # Fallback: search common locations
            CRT_DIR=""
            for candidate in \
              "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Redist/MSVC" \
              "C:/Program Files/Microsoft Visual Studio/2022/Community/VC/Redist/MSVC"; do
              if [ -d "$candidate" ]; then
                RD="$(find "$candidate" -maxdepth 1 -type d | sort -V | tail -n 1)"
                if [ -n "$RD" ]; then
                  CRT_DIR="$RD/x64/Microsoft.VC143.CRT"
                  echo "Fallback Redist dir: $CRT_DIR"
                  break
                fi
              fi
            done
          fi

          if [ -n "$CRT_DIR" ] && [ -d "$CRT_DIR" ]; then
            cp -v "$CRT_DIR/msvcp140.dll"  "$SHAREDLIBS/" 2>/dev/null || echo "msvcp140.dll not in $CRT_DIR"
            cp -v "$CRT_DIR/vcruntime140.dll" "$SHAREDLIBS/" 2>/dev/null || echo "vcruntime140.dll not in $CRT_DIR"
            cp -v "$CRT_DIR/vcruntime140_1.dll" "$SHAREDLIBS/" 2>/dev/null || true
            echo "Copied MSVC CRT DLLs from $CRT_DIR"
          else
            echo "WARNING: MSVC Redist directory not found"
          fi

          echo "Final DLL count in sharedlibs/Release: $(ls "$SHAREDLIBS"/*.dll 2>/dev/null | wc -l)"
          [ -f "$SHAREDLIBS/msvcp140.dll" ] && echo "msvcp140.dll: OK" || echo "msvcp140.dll: MISSING"
          [ -f "$SHAREDLIBS/vcruntime140.dll" ] && echo "vcruntime140.dll: OK" || echo "vcruntime140.dll: MISSING"

      - name: Build Windows with FMOD
        shell: bash
        run: |
          set -euo pipefail
          # Full build including packaging (viewer_manifest.py). Runtime DLLs
          # were staged to sharedlibs/Release in the previous step so the
          # manifest can find them.
          autobuild build \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            --no-configure \
            -- \
            --fmodstudio \
            --ninja

      - name: Collect Windows artifact
        shell: bash
        run: |
          set -euo pipefail
          # First try to find the NSIS installer produced by viewer_manifest.py
          PACKAGE="$(find build-vc170-64 -maxdepth 4 -type f -name '*_Setup.exe' 2>/dev/null | head -n 1)"
          if [ -z "$PACKAGE" ]; then
            # Fallback: try other package formats but exclude tiny/test files
            PACKAGE="$(find build-vc170-64 -maxdepth 4 -type f \( -name '*.zip' -o -name '*.7z' -o -name '*.tar.*' \) 2>/dev/null | head -n 1)"
          fi
          if [ -n "$PACKAGE" ]; then
            cp "$PACKAGE" "Tasia-Legacy-Viewer-Windows-FMOD.${PACKAGE##*.}"
            echo "Collected package: $PACKAGE ($(du -h "$PACKAGE" | cut -f1))"
            exit 0
          fi

          # Fallback: find the viewer binary + available DLLs
          VIEWER_EXE="$(find build-vc170-64 -type f -name 'firestorm-bin.exe' 2>/dev/null | head -n 1)"
          if [ -z "$VIEWER_EXE" ]; then
            echo "ERROR: firestorm-bin.exe not found in build tree"
            find build-vc170-64 -maxdepth 5 -type f 2>/dev/null | head -100
            exit 1
          fi

          echo "No package found. Collecting raw binary + DLLs."
          DIST_DIR="build-vc170-64/newview/install"
          mkdir -p "$DIST_DIR"
          cp "$VIEWER_EXE" "$DIST_DIR/Tasia-Legacy-Viewer-Windows-FMOD.exe"

          # Collect DLLs from all known locations
          for dll_dir in "build-vc170-64/packages/lib/release" "build-vc170-64/sharedlibs/Release"; do
            if [ -d "$dll_dir" ]; then
              find "$dll_dir" -maxdepth 1 -name '*.dll' 2>/dev/null -exec cp {} "$DIST_DIR/" \;
              echo "Copied DLLs from $dll_dir"
            fi
          done

          ls -la "$DIST_DIR/"
          python3 -c "
          import shutil, os
          dist = os.path.abspath('$DIST_DIR')
          files = [f for f in os.listdir(dist) if f.endswith(('.exe', '.dll'))]
          size_mb = sum(os.path.getsize(os.path.join(dist,f)) for f in files) / 1024 / 1024
          print(f'Collected {len(files)} files ({size_mb:.1f} MB)')
          archive = shutil.make_archive('Tasia-Legacy-Viewer-Windows-FMOD', 'zip', dist)
          print(f'Created archive: {archive}')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tasia-Legacy-Viewer-Windows-FMOD
          if-no-files-found: error
          path: |
            Tasia-Legacy-Viewer-Windows-FMOD.*
