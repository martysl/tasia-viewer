name: Build Legacy Viewer - Windows

on:
  push:
    branches:
      - tasia-legacy-port
      - tasia-legacy-port-win
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish GitHub pre-release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTOBUILD_ADDRSIZE: 64
  AUTOBUILD_BUILD_ID: ${{ github.run_id }}
  AUTOBUILD_INSTALLABLE_CACHE: ${{ github.workspace }}/.autobuild-installables
  AUTOBUILD_VARIABLES_FILE: ${{ github.workspace }}/.build-variables/variables
  AUTOBUILD_VCS_INFO: "true"
  AUTOBUILD_VSVER: 170
  LL_SKIP_REQUIRE_SYSROOT: 1
  XZ_DEFAULTS: -T0

jobs:
  build:
    name: Build Legacy Viewer - Windows - FMOD
    runs-on: windows-2022
    timeout-minutes: 240

    steps:
      - name: Checkout viewer source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Restore autobuild installables cache
        uses: actions/cache@v4
        with:
          path: ${{ env.AUTOBUILD_INSTALLABLE_CACHE }}
          key: autobuild-legacy-windows-${{ hashFiles('autobuild.xml') }}

      - name: Install autobuild and Python deps
        run: pip install -r requirements.txt

      - name: Checkout build variables
        uses: actions/checkout@v4
        with:
          repository: FirestormViewer/fs-build-variables
          path: .build-variables

      - name: Remove KDU (proprietary, cannot use)
        shell: bash
        run: |
          autobuild installables remove kdu || true

      - name: Download private FMOD autobuild package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FMOD_DEPS_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${GH_TOKEN:-}" ] || { echo "::error::FMOD_DEPS_TOKEN missing"; exit 1; }

          mkdir -p private-deps
          gh release download fmod-20307 \
            --repo martysl/tasia-private-deps \
            --pattern "*windows64*.tar.bz2" \
            --dir private-deps

          FMOD_PACKAGE="$(find private-deps -type f -name '*.tar.bz2' | head -n 1)"
          [ -n "$FMOD_PACKAGE" ] || { echo "::error::FMOD package missing"; exit 1; }

          FMOD_HASH=$(python3 -c "import hashlib,sys; print(hashlib.md5(open(sys.argv[1],'rb').read()).hexdigest())" "$FMOD_PACKAGE")
          FMOD_FILE_URL=$(python3 -c "import pathlib,sys; print(pathlib.Path(sys.argv[1]).resolve().as_uri())" "$FMOD_PACKAGE")

          echo "FMOD_PLATFORM=windows64" >> "$GITHUB_ENV"
          echo "FMOD_HASH=$FMOD_HASH" >> "$GITHUB_ENV"
          echo "FMOD_FILE_URL=$FMOD_FILE_URL" >> "$GITHUB_ENV"

      - name: Point autobuild to private FMOD package
        shell: bash
        run: |
          autobuild installables edit fmodstudio \
            platform="$FMOD_PLATFORM" \
            hash="$FMOD_HASH" \
            url="$FMOD_FILE_URL"

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Configure Windows with FMOD
        shell: bash
        env:
          TASIA_GIPHY_API_KEY: ${{ secrets.TASIA_GIPHY_API_KEY }}
        run: |
          set -euo pipefail
          unset CC || true
          unset CXX || true
          LOCAL_DIST_DIR="$(pwd)/build-vc170-64/newview/unpacked"
          mkdir -p "$LOCAL_DIST_DIR"
          autobuild configure \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            -- \
            --fmodstudio \
            --package \
            --ninja \
            "-DLOCAL_DIST_DIR:PATH=$LOCAL_DIST_DIR" \
            "-DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF"

      - name: Build Windows with FMOD
        shell: bash
        run: |
          set -euo pipefail
          # Build just the viewer binary with ninja (skip packaging —
          # viewer_manifest.py needs runtime DLLs not staged correctly
          # on Windows with Ninja). We'll collect the raw output as a
          # zip fallback instead.
          ninja -C build-vc170-64 newview/firestorm-bin.exe

      - name: Collect Windows artifact
        shell: bash
        run: |
          set -euo pipefail
          # Try to find a package file (zip, exe, 7z, tar.*) from the build
          PACKAGE="$(find build-vc170-64 -maxdepth 4 -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.7z' -o -name '*.tar.xz' -o -name '*.tar.bz2' \) 2>/dev/null | head -n 1)"
          if [ -n "$PACKAGE" ]; then
            cp "$PACKAGE" "Tasia-Legacy-Viewer-Windows-FMOD.${PACKAGE##*.}"
            echo "Collected package: $PACKAGE"
            exit 0
          fi

          # Fallback: zip the viewer binary and its support files
          NEWVIEW_DIR="build-vc170-64/newview/Release"
          if [ -d "$NEWVIEW_DIR" ] && [ "$(find "$NEWVIEW_DIR" -maxdepth 1 -name '*.exe' 2>/dev/null | head -n 1)" ]; then
            python3 - <<'PY'
          import shutil
          from pathlib import Path
          dist = Path('build-vc170-64/newview/Release')
          archive = shutil.make_archive('Tasia-Legacy-Viewer-Windows-FMOD', 'zip', dist)
          print(f'Created fallback archive from Release dir: {archive}')
          PY
            exit 0
          fi

          # Last resort: list build output so we can debug
          echo "ERROR: No package or install output found."
          find build-vc170-64 -maxdepth 5 -type f 2>/dev/null | head -100
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tasia-Legacy-Viewer-Windows-FMOD
          if-no-files-found: error
          path: |
            Tasia-Legacy-Viewer-Windows-FMOD.*
