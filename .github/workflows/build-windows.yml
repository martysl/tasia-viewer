name: Build Tasia Viewer Windows

'on':
  workflow_dispatch:
    inputs:
      clean_build:
        description: "Clean build directory before build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      probe_only:
        description: "Windows dependency probe only (no full build)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AUTOBUILD_ADDRSIZE: 64
  AUTOBUILD_BUILD_ID: ${{ github.run_id }}
  AUTOBUILD_INSTALLABLE_CACHE: ${{ github.workspace }}/.autobuild-installables
  AUTOBUILD_VARIABLES_FILE: ${{ github.workspace }}/.build-variables/variables
  AUTOBUILD_VCS_INFO: "true"
  AUTOBUILD_VSVER: 170
  LL_SKIP_REQUIRE_SYSROOT: 1
  XZ_DEFAULTS: -T0

jobs:
  build-windows:
    name: Build Windows FMOD
    runs-on: windows-2022
    timeout-minutes: 240

    steps:
      - name: Checkout viewer source
        uses: actions/checkout@v4
        with:
          ref: windows-build-test
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install autobuild and Python deps
        run: pip install -r requirements.txt

      - name: Checkout build variables
        uses: actions/checkout@v4
        with:
          repository: FirestormViewer/fs-build-variables
          path: .build-variables

      - name: Remove KDU
        shell: bash
        run: |
          autobuild installables remove kdu || true
          echo "KDU installable removed."

      - name: Download private FMOD autobuild package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.FMOD_DEPS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::FMOD_DEPS_TOKEN secret is missing."
            exit 1
          fi

          mkdir -p private-deps
          gh release download fmod-20307 \
            --repo martysl/tasia-private-deps \
            --pattern "*windows64*.tar.bz2" \
            --dir private-deps

          FMOD_PACKAGE="$(find private-deps -type f -name '*.tar.bz2' | head -n 1)"
          if [ -z "$FMOD_PACKAGE" ]; then
            echo "::error::FMOD Windows autobuild package was not downloaded."
            exit 1
          fi

          FMOD_HASH=$(python3 -c "import hashlib,sys; print(hashlib.md5(open(sys.argv[1],'rb').read()).hexdigest())" "$FMOD_PACKAGE")
          FMOD_FILE_URL=$(python3 -c "import pathlib,sys; print(pathlib.Path(sys.argv[1]).resolve().as_uri())" "$FMOD_PACKAGE")

          echo "FMOD_PLATFORM=windows64" >> "$GITHUB_ENV"
          echo "FMOD_PACKAGE=$FMOD_PACKAGE" >> "$GITHUB_ENV"
          echo "FMOD_HASH=$FMOD_HASH" >> "$GITHUB_ENV"
          echo "FMOD_FILE_URL=$FMOD_FILE_URL" >> "$GITHUB_ENV"

      - name: Point autobuild to private FMOD package
        shell: bash
        run: |
          set -euo pipefail
          autobuild installables edit fmodstudio \
            platform="$FMOD_PLATFORM" \
            hash="$FMOD_HASH" \
            url="$FMOD_FILE_URL"

      - name: Load autobuild environment
        shell: bash
        run: |
          autobuild source_environment > .source_env
          . .source_env
          echo "LL_BUILD=$LL_BUILD" >> "$GITHUB_ENV"
          echo "LL_BUILD_RELEASE=$LL_BUILD_RELEASE" >> "$GITHUB_ENV"

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: 2022

      - name: Install Windows build prerequisites
        shell: bash
        run: |
          choco install ninja --no-progress -y || true
          ninja --version
          cmake --version
          where cl

      - name: Set Tasia build metadata
        shell: bash
        run: |
          echo "revision=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "VIEWER_VERSION_GITHASH=${GITHUB_SHA}" >> "$GITHUB_ENV"
          TASIA_SHORT_SHA="${GITHUB_SHA}"
          echo "TASIA_SHORT_SHA=${TASIA_SHORT_SHA::7}" >> "$GITHUB_ENV"
          echo "TASIA_DISPLAY_VERSION=8.0.1.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
          echo "TASIA_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Optional clean Windows build
        if: runner.os == 'Windows' && inputs.clean_build == 'true'
        shell: bash
        run: |
          rm -rf build-vc170-64

      - name: Restore Windows build cache
        if: runner.os == 'Windows' && inputs.clean_build != 'true'
        id: restore-windows-build-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build-vc170-64
          key: windows-build-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            windows-build-${{ github.ref_name }}-
            windows-build-

      - name: Configure Windows with FMOD
        shell: bash
        run: |
          set -euo pipefail

          unset CC || true
          unset CXX || true

          VS_CMAKE="C:/Program Files/Microsoft Visual Studio/2022/Enterprise/Common7/IDE/CommonExtensions/Microsoft/CMake/CMake/bin/cmake.exe"
          if [ -f "$VS_CMAKE" ]; then
            VS_CMAKE_DIR="$(dirname "$VS_CMAKE")"
            export PATH="$VS_CMAKE_DIR:$PATH"
          fi

          LOCAL_DIST_DIR="$(pwd)/build-vc170-64/newview/unpacked"
          mkdir -p "$LOCAL_DIST_DIR"

          autobuild configure \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            -- \
            --fmodstudio \
            --no-package \
            --ninja \
            "-DLOCAL_DIST_DIR:PATH=$LOCAL_DIST_DIR"

      - name: Windows dependency probe
        if: inputs.probe_only == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Boost / Collada packages ==="
          find .autobuild-installables build-vc170-64 -iname "*boost*" -o -iname "*collada*" 2>/dev/null | head -200 || true

          echo ""
          echo "=== Link response file ==="
          if [ -f build-vc170-64/newview/CMakeFiles/firestorm-bin.rsp ]; then
            grep -i "boost.*filesystem\|collada" build-vc170-64/newview/CMakeFiles/firestorm-bin.rsp || echo "(no boost/collada entries in rsp)"
          else
            echo "firestorm-bin.rsp not generated yet"
            # Try alternate paths
            find build-vc170-64 -name "*.rsp" | head -5
          fi

          echo ""
          echo "=== CMakeCache boost/collada ==="
          if [ -f build-vc170-64/CMakeCache.txt ]; then
            grep -i "boost\|collada" build-vc170-64/CMakeCache.txt | head -200 || true
          else
            echo "CMakeCache.txt not found"
          fi

          echo ""
          echo "=== Boost version check ==="
          find build-vc170-64/_deps -maxdepth 3 -name "CMakeLists.txt" -path "*boost*" 2>/dev/null | head -5
          head -5 build-vc170-64/_deps/boost-src/CMakeLists.txt 2>/dev/null || echo "boost-src not found"

          echo ""
          echo "Probe complete. Stopping before full build."
          exit 0

      - name: Verify Boost version for Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Boost version.hpp ==="
          grep -E "#define BOOST_VERSION|#define BOOST_LIB_VERSION" build-vc170-64/_deps/boost-src/boost/version.hpp

          echo "=== Colladadom lib ==="
          ls -lah build-vc170-64/packages/lib/release/libcollada14dom23-s.lib

          echo "=== Boost filesystem build dir ==="
          test -d build-vc170-64/_deps/boost-build/libs/filesystem

      - name: Build Windows with FMOD
        if: inputs.probe_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          autobuild build \
            -c ReleaseFS_open \
            -A ${{ env.AUTOBUILD_ADDRSIZE }} \
            --no-configure \
            -- \
            --fmodstudio \
            --no-package \
            --ninja

      - name: Create Windows ZIP artifact
        if: inputs.probe_only != 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import shutil
          from pathlib import Path

          dist = Path('build-vc170-64/newview/unpacked')
          if not dist.is_dir():
              raise SystemExit(f'Missing unpacked Windows dist: {dist}')
          archive = shutil.make_archive('Tasia-Viewer-Windows-FMOD', 'zip', dist)
          print(f'Created {archive}')
          PY

      - name: Upload artifact - Windows
        if: inputs.probe_only != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Tasia-Viewer-Windows-FMOD
          if-no-files-found: error
          path: Tasia-Viewer-Windows-FMOD.zip

      - name: Save Windows build cache
        if: always() && runner.os == 'Windows'
        uses: actions/cache/save@v4
        with:
          path: |
            build-vc170-64
          key: windows-build-${{ github.ref_name }}-${{ github.run_id }}
